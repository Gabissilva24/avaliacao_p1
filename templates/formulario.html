{% extends 'base.html' %}

{% block titulo %}Novo Cálculo — Simulador de Custos de Viagem{% endblock %}

{% block conteudo %}

<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <strong>💰 Novo Cálculo de Custos de Viagem</strong>
            </div>
            <div class="card-body">
                <form action="{{ url_for('calcular') }}" method="POST">

                    <div class="mb-3">
                        <label for="valor_conta" class="form-label">Distância em KM</label>
                        <input type="number" class="form-control" id="distancia_conta" name="distancia_conta"
                               required step="0.01" min="0.01" placeholder="Ex: 160.60">
                        <div class="form-text">Distância.</div>
                    </div>

                    <div class="mb-3">
                        <label for="qtd_pessoas" class="form-label">Consumo</label>
                        <input type="number" class="form-control" id="consumo_conta" name="consumo_conta"
                               required step="1" min="1" placeholder="Ex: 4">
                        <div class="form-text">Consumo</div>
                    </div>

                    <div class="mb-3">
                        <label for="pct_gorjeta" class="form-label">Preço R$</label>
                        <input type="number" class="form-control" id="preco_conta" name="preco_conta"
                               required step="0.1" min="0" placeholder="Ex: 10.6">
                        <div class="form-text">Preço</div>
                    </div>

                    <div class="d-flex gap-2 mt-3">
                        <button type="submit" class="btn btn-primary">💾 Calcular e Salvar</button>
                        <button type="reset" class="btn btn-outline-secondary">🔄 Limpar</button>
                        <a href="{{ url_for('index') }}" class="btn btn-outline-danger">✖ Voltar</a>
                    </div>

                </form>
            </div>            
        </div>
    </div>
</div>

{% endblock %}
